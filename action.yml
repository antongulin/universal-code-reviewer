name: "Universal Code Reviewer"
description: "AI-powered code reviews using any OpenAI-compatible LLM. Supports automatic PR reviews and slash commands with no action-level quotas."
author: "antongulin"
branding:
  icon: "eye"
  color: "blue"

inputs:
  github-token:
    description: "GitHub token for posting PR review comments"
    required: true
    default: "${{ github.token }}"
  llm-api-key:
    description: "API key for your LLM endpoint. Use \"ollama\" for self-hosted Ollama."
    required: false
    default: "ollama"
  api-key:
    description: "Alias for llm-api-key"
    required: false
    default: ""
  llm-base-url:
    description: "Base URL for OpenAI-compatible API. Examples: https://api.openai.com/v1, http://your-server:11434/v1"
    required: true
  base-url:
    description: "Alias for llm-base-url"
    required: false
    default: ""
  model:
    description: "Model name to use. Examples: gpt-4o, llama3.2, codellama:13b, or your provider-specific model name."
    required: true
  fail-on-critical:
    description: "Deprecated alias for fail-on-high. If true, the action will fail when high severity issues are found."
    required: false
    default: "false"
  fail-on-high:
    description: "If true, the action will fail when high severity issues are found."
    required: false
    default: "false"
  max-diff-size:
    description: "Maximum diff size in characters to send to the model. Large diffs are truncated."
    required: false
    default: "50000"
  max-output-tokens:
    description: "Optional maximum tokens for the LLM response. Leave empty to use the provider/model default."
    required: false
    default: ""
  llm-timeout-ms:
    description: "Timeout in milliseconds for LLM requests. Default is 10 minutes (600000 ms). Increase if you frequently see 'Request timed out' with large diffs."
    required: false
    default: "600000"
  max-comments:
    description: "Maximum number of inline review comments to post. Extra findings stay in the review body."
    required: false
    default: "25"
  min-command-permission:
    description: "Minimum repository permission required to run slash commands: read, triage, write, maintain, or admin."
    required: false
    default: "write"
  review-instructions:
    description: "Additional reviewer instructions appended to the built-in review prompt."
    required: false
    default: ""
  review-instructions-file:
    description: "Repository file containing additional reviewer instructions. Read from the PR base branch for safety."
    required: false
    default: ".github/code-reviewer.md"

runs:
  using: "node24"
  main: "dist/index.js"
